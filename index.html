<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#1e3a8a,#7c3aed);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0;
      padding:20px;
    }

    .card{
      background:white;
      padding:40px;
      border-radius:20px;
      width:100%;
      max-width:380px;
      box-shadow:0 20px 40px rgba(0,0,0,0.25);
    }

    h1{
      margin-top:0;
      margin-bottom:25px;
    }

    label{
      display:block;
      margin-bottom:6px;
      font-weight:bold;
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:18px;
      border-radius:10px;
      border:1px solid #ccc;
      font-size:14px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#4f46e5;
      color:white;
      font-weight:bold;
      font-size:15px;
      cursor:pointer;
    }

    #status{
      margin-top:15px;
      font-size:14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Formulário</h1>

    <form id="customForm">
      <label for="empresa">Empresa</label>
      <input id="empresa" name="empresa" required>

      <label for="email">Email</label>
      <input id="email" name="email" type="email" required>

      <label for="pais">País</label>
      <input id="pais" name="pais" required>

      <button type="submit" id="submitBtn">Enviar</button>
      <div id="status"></div>
    </form>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyFUdzWluNeJmgU8qW3SzJYwqa6V2nKbp2dbsxOt17gQcIgXV2QDnN4jUcOv22RYuFw/exec";

    const form = document.getElementById("customForm");
    const status = document.getElementById("status");
    const submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      submitBtn.disabled = true;
      status.innerText = "A enviar...";

      const data = new URLSearchParams();
      data.append("empresa", document.getElementById("empresa").value);
      data.append("email", document.getElementById("email").value);
      data.append("pais", document.getElementById("pais").value);

      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded"
          },
          body: data.toString()
        });

        form.reset();
        status.innerText = "Pedido enviado.";
      } catch (error) {
        status.innerText = "Erro ao enviar.";
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
